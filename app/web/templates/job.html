<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Job {{ job_id }}</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {% include "_header.html" %}
  <div class="wrap">
    <h1>{{ display_name }}</h1>
    
    <div class="mono">
      <a class="btn" href="/">← Назад</a>
    </div>

    <div id="status" class="box">Статус: ...</div>

    <div class="box">
      <div>Прогресс: <span id="progressText">0/0</span></div>
      <div class="bar">
        <div id="barFill" class="barFill" style="width:0%"></div>
      </div>
      <div class="grid">
        <div>Найдено: <b id="matched">0</b></div>
        <div>Не найдено: <b id="notFound">0</b></div>
        <div>Ошибка: <b id="failed">0</b></div>
      </div>
    </div>

    <div class="box">
      <div><b>Логи</b> <span class="hint">(обновляется автоматически)</span></div>
      <pre id="log" class="logbox">...</pre>
    </div>

    <div class="box">
      <a id="download" class="btn disabled" href="#" aria-disabled="true">Скачать CSV</a>
      <button id="cancelBtn" class="btn danger">Остановить</button>
      <a class="btn" href="/">Новая загрузка</a>
    </div>
  </div>

  <script>
    window.JOB_ID = "{{ job_id }}";
  </script>
  <script src="/static/app.js"></script>
</body>
</html>
