services:
  apteka_api:
    build: .
    container_name: apteka_api
    expose:
      - "8000"
    environment:
      JOB_STORE: /app/job_store
      PARSE_TIMEOUT: 10
      PARSE_MAX_RETRIES: 10
      PARSE_PAUSE: 3
    volumes:
      - job_store_data:/app/job_store
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: apteka_nginx
    depends_on:
      - apteka_api
    ports:
      - "${NGINX_HOST_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    
volumes:
  job_store_data:
